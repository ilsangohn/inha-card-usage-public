    const form=document.getElementById("form");
    const error=document.getElementById("error");
    form.addEventListener("submit",async(event)=>{
      event.preventDefault();
      error.hidden=true;
      try{
        const html=await decrypt(document.getElementById("password").value);
        document.open();
        document.write(html);
        document.close();
      }catch(e){
        error.hidden=false;
      }
    });
    async function decrypt(password){
      const salt=base64ToBytes(payload.salt);
      const iv=base64ToBytes(payload.iv);
      const data=base64ToBytes(payload.data);
      const baseKey=await crypto.subtle.importKey("raw",new TextEncoder().encode(password),"PBKDF2",false,["deriveKey"]);
      const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:payload.iterations,hash:"SHA-256"},baseKey,{name:"AES-GCM",length:256},false,["decrypt"]);
      const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,data);
      return new TextDecoder().decode(plain);
    }
    function base64ToBytes(value){
      const binary=atob(value);
      const bytes=new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i+=1)bytes[i]=binary.charCodeAt(i);
      return bytes;
    }
